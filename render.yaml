services:
  - type: web
    name: polaris-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: JWT_SECRET
        value: your-secret-key-change-this-abc123xyz
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: polaris-db
          property: connectionString

databases:
  - name: polaris-db
    plan: free